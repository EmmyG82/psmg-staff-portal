name: Create Issue from TODO keyword
on:
  push:
    branches: [ main ]

permissions:
  contents: read
  issues: write

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get last commit message
        id: commit
        run: |
          # Get the last commit message (works for single-commit pushes)
          msg=$(git log -1 --pretty=%B)
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$msg" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check for keyword
        id: check
        run: |
          echo "Checking for @makeAnIssue in commit message..."
          if echo "${{ steps.commit.outputs.commit_message }}" | grep -q "@makeAnIssue"; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Write issue body to file
  if: steps.check.outputs.found == 'true'
  run: |
    cat > issue-body.md <<'EOF'
    ${{ steps.commit.outputs.commit_message }}
    EOF

      - name: Create issue when keyword present
  if: steps.check.outputs.found == 'true'
  uses: peter-evans/create-issue-from-file@v5
  with:
    title: ${{ github.event.head_commit.message || steps.commit.outputs.commit_message }}
    content-filepath: issue-body.md
    labels: todo
    assignees: EmmyG82
  env:
    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}