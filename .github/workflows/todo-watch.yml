name: TODO Watcher

on:
  push:
    branches: [main]

permissions:
  issues: write
  contents: read

jobs:
  todo-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse config.yml and create issue if needed
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Read config
            const raw = fs.readFileSync('.github/config.yml', 'utf8');

            // Extract @makeAnIssue block title + body
            const titleMatch = raw.match(/title:\s*["']?(.+?)["']?\s*\n/);
            const bodyMatch = raw.match(/body:\s*["'](.+?)["']/s);

            if (!titleMatch || !bodyMatch) {
              console.log('No @makeAnIssue entry found in config.yml');
              return;
            }

            const title = titleMatch[1].trim();
            const body = bodyMatch[1].trim();

            // Check if an open issue with this exact title already exists
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const alreadyExists = existing.some(i => i.title === title);
            if (alreadyExists) {
              console.log(`Issue already exists: "${title}"`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['todo'],
            });

            console.log(`Created issue: "${title}"`);
